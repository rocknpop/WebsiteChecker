<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - DownOrUp.net</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              850: '#1e293b',
              950: '#020617',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center relative overflow-hidden transition-colors duration-300">
  
  <!-- Sleek background decorations -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-3xl pointer-events-none -z-10"></div>
  <div class="absolute top-1/4 left-1/3 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl pointer-events-none -z-10"></div>

  <!-- Main Container -->
  <div class="max-w-md w-full px-6 text-center space-y-8 relative z-10 animate-fade-in">
    
    <!-- Logo Section -->
    <a href="/" class="inline-flex items-center space-x-2.5 select-none group transition-transform duration-200 hover:scale-105">
      <div class="h-10 w-10 bg-gradient-to-tr from-blue-600 via-indigo-600 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
        <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      </div>
      <div class="leading-tight text-left">
        <span class="font-sans font-extrabold text-2xl tracking-tight bg-gradient-to-r from-blue-600 via-indigo-500 to-amber-500 dark:from-blue-400 dark:via-cyan-450 dark:to-amber-300 bg-clip-text text-transparent">
          DownOrUp<span class="text-blue-500 dark:text-cyan-400">.net</span>
        </span>
        <span class="text-[10px] block font-mono text-gray-400 dark:text-gray-500 -mt-0.5 font-semibold tracking-widest">
          SHOULD YOU DO IT?
        </span>
      </div>
    </a>

    <!-- 404 Visual Card -->
    <div class="bg-white dark:bg-slate-900/80 backdrop-blur-md border border-slate-200/50 dark:border-slate-800/80 p-8 sm:p-10 rounded-3xl shadow-2xl space-y-6">
      
      <!-- 404 Large Error Text -->
      <div class="relative inline-block">
        <h2 class="text-8xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-blue-500 via-indigo-500 to-rose-500 animate-pulse select-none">
          404
        </h2>
        <span class="absolute -bottom-1 left-1/2 -translate-x-1/2 bg-rose-500/10 text-rose-500 border border-rose-500/20 px-2 py-0.5 rounded text-[10px] font-mono font-bold uppercase tracking-wider">
          NOT FOUND
        </span>
      </div>

      <div class="space-y-2">
        <h3 class="text-xl font-bold text-slate-900 dark:text-white font-sans">
          Page Not Found
        </h3>
        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed max-w-xs mx-auto">
          The decision route or check query you are looking for has either expired, moved, or never existed in 2026.
        </p>
      </div>

      <!-- Button back to home -->
      <div>
        <a href="/" class="w-full inline-flex items-center justify-center space-x-2 px-6 py-3 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold text-sm rounded-xl transition-all shadow-lg shadow-blue-500/20 cursor-pointer">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          <span>Back to Homepage</span>
        </a>
      </div>

    </div>

    <!-- Fine Print Footer -->
    <div class="text-center">
      <p class="text-[10px] font-mono text-slate-400 dark:text-slate-500">
        &copy; 2026 DownOrUp.net AI Decision Engine
      </p>
    </div>

  </div>

</body>
</html>
